name: Corregir logo de CAP

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/corregir-logo-cap.yml'

permissions:
  contents: write

jobs:
  corregir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Corregir logo y favicon
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's#https://crebe-ucayali.github.io/banco-digital-accesible/logo-crebe.png#logo-crebe.png#g' index.html
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          marker = '  <title>Jornadas de capacitación CREBE</title>\n'
          favicon = '  <link rel="icon" type="image/png" href="logo-crebe.png">\n'
          if favicon not in text:
              text = text.replace(marker, marker + favicon)
          p.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/corregir-logo-cap.yml
      - name: Guardar cambios
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Corregir logo y favicon en CAP'
          git push
